        <main>
            <div class="card contact-card">

           <div class="card contact-card">
    <h2 class="card-title">Обратная связь</h2>
    <form id="feedbackForm" novalidate>
        <div class="mb-3 field">
            <label for="fullname" class="form-label">ФИО<span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="fullname" placeholder="Иванов Иван Иванович" required>
        </div>
        
        <div class="mb-3">
            <label for="email" class="form-label">Адрес электронной почты<span class="text-danger">*</span></label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
        </div>
        
        <div class="mb-3">
            <label for="topic" class="form-label">Тип обращения<span class="text-danger">*</span></label>
            <select class="form-select" id="topic" required>
                <option value="" selected disabled>Выберите тему обращения</option>
                <option value="1">Предложения</option>
                <option value="2">Жалоба</option>
                <option value="3">Вопрос</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label for="message" class="form-label">Введите текст<span class="text-danger">*</span></label>
            <textarea class="form-control" id="message" rows="3" required></textarea>
        </div>
        
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="agreement" required>
            <label class="form-check-label" for="agreement">
                Согласен(а) на обработку персональных данных <span class="text-danger">*</span>
            </label>
        </div>
        
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Отправить</button>
        </div>
    </form>
</div>
